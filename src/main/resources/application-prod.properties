spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.expiration-hours=${JWT_EXPIRATION_HOURS:12}

app.bootstrap.admin.name=${BOOTSTRAP_ADMIN_NAME:Administrador}
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:admin@servicego.local}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD}

spring.application.name=ServiceGo
spring.profiles.default=local

# ============================================
# Banco de Dados (PostgreSQL)
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/servicego
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA/Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.security.jwt.secret=servicego-secret-key-2026-super-segura-123456
app.security.jwt.expiration-hours=12

app.bootstrap.admin.name=Administrador
app.bootstrap.admin.email=admin@servicego.local
app.bootstrap.admin.password=admin123

springdoc.swagger-ui.path=/swagger-ui.html

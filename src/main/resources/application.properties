spring.application.name=ServiceGo
spring.profiles.default=local

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.security.jwt.secret=change-this-secret-with-at-least-32-characters
app.security.jwt.expiration-hours=12

app.bootstrap.admin.name=Administrador
app.bootstrap.admin.email=admin@servicego.local
app.bootstrap.admin.password=admin123

springdoc.swagger-ui.path=/swagger-ui.html
